<div class="container" id="orcamento">
    <div class="sessao-form">
        <h2 style="margin-top: 0;">Solicitar Orçamento</h2>
        <form id="formPlanilha">
            <div class="form-group">
                <label>Nome Completo / Empresa:</label>
                <input type="text" name="nome" required>
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="form-group" style="flex:1;">
                    <label>E-mail:</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group" style="flex:1;">
                    <label>WhatsApp:</label>
                    <input type="tel" name="whatsapp" required>
                </div>
            </div>
            <div class="form-group">
                <label>Produto de Interesse:</label>
                <select name="produto">
                    <option value="Cartão de Visita">Cartão de Visita</option>
                    <option value="Banner">Banner</option>
                    <option value="Adesivo">Adesivo</option>
                    <option value="Outros">Outros</option>
                </select>
            </div>
            <div class="form-group">
                <label>Detalhes do Pedido:</label>
                <textarea name="detalhes" rows="3" placeholder="Quantidade, gramatura..."></textarea>
            </div>
            <div class="form-group">
                <label>Possui Arte? Selecione abaixo (Envio final via WhatsApp):</label>
                <input type="file" id="inputArquivo"> </div>
            <button type="submit" id="btnEnviar" class="btn-enviar">ENVIAR E CHAMAR NO WHATSAPP</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbze8z7IMtqrnQNsGSr8oNfIAWmAtxkjgsBT2q57Sby3yAFII7W9cM8aidlIVjP_m5g_/exec'; 
    const form = document.getElementById('formPlanilha');
    const btn = document.getElementById('btnEnviar');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando Pedido...";

        // Criamos um objeto de URL Search Params para enviar APENAS TEXTO
        // Isso evita o erro de envio de arquivos pesados para o Apps Script
        const params = new URLSearchParams();
        params.append('nome', form.nome.value);
        params.append('email', form.email.value);
        params.append('whatsapp', form.whatsapp.value);
        params.append('produto', form.produto.value);
        
        const temArquivo = document.getElementById('inputArquivo').files.length > 0;
        const infoArquivo = temArquivo ? " [Arquivo enviado via WhatsApp]" : " [Sem arquivo]";
        params.append('detalhes', form.detalhes.value + infoArquivo);

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', // Adicionado para evitar bloqueios de segurança
            body: params 
        })
        .then(() => {
            // No modo 'no-cors' o fetch não retorna 'ok', então tratamos como sucesso
            const nome = form.nome.value;
            const produto = form.produto.value;
            const msg = `Olá! Solicitei um orçamento no site.\n*Nome:* ${nome}\n*Produto:* ${produto}\n${temArquivo ? "*Segue o arquivo da arte:* 👇" : ""}`;
            
            const uri = `https://wa.me/5591984469183?text=${encodeURIComponent(msg)}`;
            window.open(uri, '_blank');

            alert("Sucesso! Orçamento registrado. Agora mande a arte no WhatsApp.");
            btn.disabled = false;
            btn.innerText = "ENVIAR E CHAMAR NO WHATSAPP";
            form.reset();
        })
        .catch(error => {
            console.error(error);
            alert("Erro ao gravar. Verifique se o Script está publicado como 'Qualquer Pessoa'.");
            btn.disabled = false;
            btn.innerText = "ENVIAR E CHAMAR NO WHATSAPP";
        });
    });
</script>
