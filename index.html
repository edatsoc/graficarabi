<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfica Rabí - Orçamentos</title>
    <style>
        :root {
            --vinho: #7b2c34;
            --preto: #1A1A1A;
            --ouro: #D4AF37;
        }

        body { 
            font-family: sans-serif; 
            margin: 0; 
            position: relative;
            background-color: #fff;
        }

        /* MARCA D'ÁGUA DISCRETA */
        body::before {
            content: "";
            position: fixed;
            top: 50%; left: 50%;
            width: 50vw; height: 50vh;
            transform: translate(-50%, -50%);
            background: url('logo_rabi.png') no-repeat center;
            background-size: contain;
            opacity: 0.04; /* Bem suave */
            z-index: -1;
            pointer-events: none;
        }

        header { text-align: center; padding: 20px; border-bottom: 4px solid var(--vinho); }
        .logo { max-width: 280px; }

        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        /* GRADE 3x5 */
        .grid-produtos { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 20px; 
            margin-bottom: 50px;
        }

        .card { 
            border: 1px solid #ddd; 
            padding: 15px; 
            text-align: center; 
            background: rgba(255,255,255,0.8);
            border-radius: 5px;
        }

        /* FORMULÁRIO */
        .form-box { 
            background: #f9f9f9; 
            padding: 30px; 
            border-radius: 8px; 
            border-top: 5px solid var(--vinho);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input, select, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; 
            border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }

        .btn { 
            background: var(--vinho); color: white; border: none; 
            padding: 15px; width: 100%; cursor: pointer; font-weight: bold; 
        }
        
        .btn:disabled { background: #ccc; }
    </style>
</head>
<body>

<header>
    <img src="logo_rabi.png" alt="Logo Gráfica Rabí" class="logo">
</header>

<div class="container">
    <h2 style="text-align:center; color: var(--vinho);">Nossos Produtos</h2>
    <div class="grid-produtos">
        <div class="card"><h3>Cartões</h3><p>Couchê 300g</p></div>
        <div class="card"><h3>Banners</h3><p>Lona 440g</p></div>
        <div class="card"><h3>Adesivos</h3><p>Vinil Brilho</p></div>
        </div>

    <div class="form-box" id="orcamento">
        <h3>Solicitar Orçamento</h3>
        <form id="meuForm">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="email" name="email" placeholder="E-mail" required>
            <input type="tel" name="whatsapp" placeholder="WhatsApp (91) 9XXXX-XXXX" required>
            
            <select name="produto">
                <option value="Cartão de Visita">Cartão de Visita</option>
                <option value="Banner">Banner</option>
                <option value="Adesivo">Adesivo</option>
                <option value="Outros">Outros</option>
            </select>

            <textarea name="detalhes" rows="4" placeholder="Detalhes (Quantidade, tamanho...)"></textarea>
            
            <button type="submit" id="btnEnviar" class="btn">ENVIAR PEDIDO</button>
        </form>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbze8z7IMtqrnQNsGSr8oNfIAWmAtxkjgsBT2q57Sby3yAFII7W9cM8aidlIVjP_m5g_/exec'; // <--- INSIRA A URL AQUI
    const form = document.getElementById('meuForm');
    const btn = document.getElementById('btnEnviar');

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.innerText = "Enviando para a planilha...";

        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("Recebemos seu pedido! Verifique sua planilha.");
                btn.disabled = false;
                btn.innerText = "ENVIAR PEDIDO";
                form.reset();
            })
            .catch(error => {
                alert("Erro ao enviar. Tente novamente.");
                btn.disabled = false;
            });
    });
</script>

</body>
</html>
